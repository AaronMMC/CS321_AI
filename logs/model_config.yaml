# Model Configuration
# Controls which model is loaded at runtime and its inference settings.

active_model: "tinybert"        # tinybert | bert | ensemble

tinybert:
  model_name: "huawei-noah/TinyBERT_4L_312D"
  model_path: "models_saved/tinybert_enron_spam"   # local fine-tuned; falls back to HuggingFace
  max_length: 256
  use_gpu: true
  batch_size: 32

bert:
  model_name: "bert-base-uncased"
  model_path: "models_saved/bert_phishing_detector_v1"
  max_length: 512
  use_external_features: true
  dropout: 0.3
  use_gpu: true
  batch_size: 16

ensemble:
  strategy: "average"           # average | max | vote
  use_external: true
  weights:
    tinybert: 0.55
    hf_tinybert: 0.30
    external: 0.15

thresholds:
  safe: 0.0
  low: 0.2
  medium: 0.4
  high: 0.6
  critical: 0.8

score_weights:
  model: 0.60
  external: 0.30
  heuristic: 0.10

cache:
  enabled: true
  ttl_hours: 6
  max_size_mb: 256