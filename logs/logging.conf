# Logging configuration for the Email Security Gateway.
# The application uses loguru; this file documents the intended setup
# and is read by src/utils/logger.py at startup.

[loguru]

# Console handler
console:
  enabled: true
  level: INFO                   # DEBUG | INFO | WARNING | ERROR | CRITICAL
  colorize: true
  format: "<green>{time:YYYY-MM-DD HH:mm:ss}</green> | <level>{level:<8}</level> | <cyan>{name}</cyan>:<cyan>{line}</cyan> - <level>{message}</level>"

# Main rotating file handler
file:
  enabled: true
  path: logs/email_security.log
  level: INFO
  rotation: "10 MB"
  retention: "30 days"
  compression: "zip"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {name}:{function}:{line} - {message}"

# Error-only log (for alerting / monitoring systems)
error_file:
  enabled: true
  path: logs/errors.log
  level: ERROR
  rotation: "10 MB"
  retention: "30 days"
  compression: "zip"

# Audit log (admin actions, model feedback)
audit_file:
  enabled: true
  path: logs/audit.log
  level: INFO
  rotation: "50 MB"
  retention: "90 days"
  compression: "zip"